name: sign_app
description: Sign Language Translation App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  go_router: ^13.2.0
  provider: ^6.1.2
  camera: ^0.10.5+9
  http: ^1.2.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.3
  onnxruntime: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/model_autsl.onnx
    - assets/models/model_asl_citizen.onnx
    - assets/models/preprocess_autsl.json
    - assets/models/preprocess_asl_citizen.json
